name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'runner-images.txt'
      - 'target-cmake.json'
      - 'prebuild.sh'
      - 'build.sh'
      - 'postbuild.sh'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      expected-runner: ${{ steps.read-config.outputs.runner }}
      target-name: ${{ steps.read-config.outputs.target-name }}
      tarball-url: ${{ steps.read-config.outputs.tarball-url }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Read configuration files
        id: read-config
        run: |
          RUNNER=$(cat runner-images.txt | tr -d '[:space:]')
          TARGET_NAME=$(jq -r '.target_name' target-cmake.json)
          TARBALL_URL=$(jq -r '.tarball_url' target-cmake.json)
          
          echo "runner=$RUNNER" >> $GITHUB_OUTPUT
          echo "target-name=$TARGET_NAME" >> $GITHUB_OUTPUT
          echo "tarball-url=$TARBALL_URL" >> $GITHUB_OUTPUT
          
          echo "::notice::Expected runner: $RUNNER"
          echo "::notice::Target name: $TARGET_NAME"
          echo "::notice::Tarball URL: $TARBALL_URL"

  build:
    needs: prepare
    runs-on: ${{ matrix.runner }}
    
    strategy:
      matrix:
        runner: [ubuntu-24.04, ubuntu-22.04, macos-26, macos-26-intel, windows-2025]
      fail-fast: false
    
    steps:
      - name: Check runner match
        id: runner-check
        if: matrix.runner == needs.prepare.outputs.expected-runner
        run: echo "match=true" >> $GITHUB_OUTPUT
      
      - name: Early exit - runner mismatch
        if: matrix.runner != needs.prepare.outputs.expected-runner
        run: |
          echo "Skipping ${{ matrix.runner }} - expected ${{ needs.prepare.outputs.expected-runner }}"
          exit 0
      
      - name: Checkout repository
        if: steps.runner-check.outputs.match == 'true'
        uses: actions/checkout@v6
      
      - name: Download tarball
        if: steps.runner-check.outputs.match == 'true'
        id: download
        run: |
          TARBALL_URL="${{ needs.prepare.outputs.tarball-url }}"
          
          # Extract filename from URL
          FILENAME=$(basename "$TARBALL_URL" | cut -d'?' -f1)
          ARCHIVE_PATH="${{ runner.temp }}/$FILENAME"
          
          echo "Downloading from: $TARBALL_URL"
          echo "Saving to: $ARCHIVE_PATH"
          
          if command -v curl &> /dev/null; then
            curl -L -o "$ARCHIVE_PATH" "$TARBALL_URL"
          elif command -v wget &> /dev/null; then
            wget -O "$ARCHIVE_PATH" "$TARBALL_URL"
          else
            echo "Error: Neither curl nor wget available"
            exit 1
          fi
          
          echo "archive-path=$ARCHIVE_PATH" >> $GITHUB_OUTPUT
          echo "Download complete: $(ls -lh "$ARCHIVE_PATH")"
        shell: bash
      
      - name: Extract tarball
        if: steps.runner-check.outputs.match == 'true'
        id: extract
        run: |
          ARCHIVE_PATH="${{ steps.download.outputs.archive-path }}"
          EXTRACT_DIR="${{ runner.temp }}/extracted"
          
          mkdir -p "$EXTRACT_DIR"
          
          echo "Extracting archive: $ARCHIVE_PATH"
          
          # Detect archive type by extension or file content
          ARCHIVE_TYPE=""
          
          if [[ "$ARCHIVE_PATH" == *.zip ]]; then
            ARCHIVE_TYPE="zip"
          elif [[ "$ARCHIVE_PATH" == *.tar.gz ]] || [[ "$ARCHIVE_PATH" == *.tgz ]]; then
            ARCHIVE_TYPE="tar.gz"
          elif [[ "$ARCHIVE_PATH" == *.tar.bz2 ]] || [[ "$ARCHIVE_PATH" == *.tbz2 ]]; then
            ARCHIVE_TYPE="tar.bz2"
          elif [[ "$ARCHIVE_PATH" == *.tar ]]; then
            ARCHIVE_TYPE="tar"
          else
            # Fallback: detect using file command
            FILE_TYPE=$(file -b "$ARCHIVE_PATH")
            echo "Detected file type: $FILE_TYPE"
            
            if echo "$FILE_TYPE" | grep -qi "zip"; then
              ARCHIVE_TYPE="zip"
            elif echo "$FILE_TYPE" | grep -qi "gzip"; then
              ARCHIVE_TYPE="tar.gz"
            elif echo "$FILE_TYPE" | grep -qi "bzip2"; then
              ARCHIVE_TYPE="tar.bz2"
            elif echo "$FILE_TYPE" | grep -qi "tar archive"; then
              ARCHIVE_TYPE="tar"
            fi
          fi
          
          echo "Archive type: $ARCHIVE_TYPE"
          
          # Extract based on detected type
          case "$ARCHIVE_TYPE" in
            zip)
              echo "Extracting ZIP archive..."
              unzip -q "$ARCHIVE_PATH" -d "$EXTRACT_DIR"
              ;;
            tar.gz)
              echo "Extracting tar.gz archive..."
              tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"
              ;;
            tar.bz2)
              echo "Extracting tar.bz2 archive..."
              tar -xjf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"
              ;;
            tar)
              echo "Extracting tar archive..."
              tar -xf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"
              ;;
            *)
              echo "Error: Unsupported or undetectable archive format"
              echo "File type: $(file -b "$ARCHIVE_PATH")"
              echo "Supported formats: .zip, .tar.gz, .tgz, .tar.bz2, .tbz2, .tar"
              exit 1
              ;;
          esac
          
          echo "extract-dir=$EXTRACT_DIR" >> $GITHUB_OUTPUT
          echo "Extraction complete"
        shell: bash
      
      - name: Find CMakeLists.txt directory
        if: steps.runner-check.outputs.match == 'true'
        id: find-cmake
        run: |
          EXTRACT_DIR="${{ steps.extract.outputs.extract-dir }}"
          
          echo "Searching for CMakeLists.txt in: $EXTRACT_DIR"
          
          # First, check for CMakeLists.txt in the root of EXTRACT_DIR
          if [ -f "$EXTRACT_DIR/CMakeLists.txt" ]; then
            WORK_DIR="$EXTRACT_DIR"
            echo "Found top-level CMakeLists.txt in: $WORK_DIR"
          else
            # If not in root, search for wrapper directory (single subdirectory)
            SUBDIR_COUNT=$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)
            
            if [ "$SUBDIR_COUNT" -eq 1 ]; then
              # Single subdirectory - likely a wrapper directory
              WRAPPER_DIR=$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d)
              
              if [ -f "$WRAPPER_DIR/CMakeLists.txt" ]; then
                WORK_DIR="$WRAPPER_DIR"
                echo "Found CMakeLists.txt in wrapper directory: $WORK_DIR"
              else
                # Search recursively as fallback
                WORK_DIR=$(find "$WRAPPER_DIR" -type f -name "CMakeLists.txt" -printf '%h\n' -quit | head -n1)
                echo "Found CMakeLists.txt in subdirectory: $WORK_DIR"
              fi
            else
              # Multiple subdirectories - search recursively
              WORK_DIR=$(find "$EXTRACT_DIR" -type f -name "CMakeLists.txt" -printf '%h\n' -quit | head -n1)
              echo "Found CMakeLists.txt in: $WORK_DIR"
            fi
          fi
          
          if [ -z "$WORK_DIR" ]; then
            echo "::error::CMakeLists.txt not found in extracted tarball"
            exit 1
          fi
          
          # Verify this is a proper GROMACS CMakeLists.txt (check for project() command)
          if ! grep -q "project" "$WORK_DIR/CMakeLists.txt"; then
            echo "::warning::CMakeLists.txt found but doesn't appear to be a main project file"
            echo "Contents of $WORK_DIR/CMakeLists.txt:"
            head -10 "$WORK_DIR/CMakeLists.txt"
            
            # Try to find a better CMakeLists.txt
            echo "Searching for main CMakeLists.txt..."
            for cmakefile in $(find "$EXTRACT_DIR" -name "CMakeLists.txt" -type f); do
              if grep -q "project" "$cmakefile" 2>/dev/null; then
                WORK_DIR=$(dirname "$cmakefile")
                echo "Found main CMakeLists.txt in: $WORK_DIR"
                break
              fi
            done
          fi
          
          echo "work-dir=$WORK_DIR" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Copy build scripts
        if: steps.runner-check.outputs.match == 'true'
        run: |
          WORK_DIR="${{ steps.find-cmake.outputs.work-dir }}"
          
          echo "Copying build scripts to: $WORK_DIR"
          
          cp runner-images.txt "$WORK_DIR/"
          cp target-cmake.json "$WORK_DIR/"
          cp prebuild.sh "$WORK_DIR/"
          cp build.sh "$WORK_DIR/"
          cp postbuild.sh "$WORK_DIR/"
          
          chmod +x "$WORK_DIR/prebuild.sh"
          chmod +x "$WORK_DIR/build.sh"
          chmod +x "$WORK_DIR/postbuild.sh"
          
          echo "Scripts copied and made executable"
        shell: bash
      
      - name: Execute prebuild.sh
        if: steps.runner-check.outputs.match == 'true'
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: |
          echo "Executing prebuild.sh..."
          ./prebuild.sh
        shell: bash
      
      - name: Execute build.sh
        if: steps.runner-check.outputs.match == 'true'
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: |
          echo "Executing build.sh..."
          ./build.sh
        shell: bash
      
      - name: Execute postbuild.sh
        if: steps.runner-check.outputs.match == 'true'
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: |
          echo "Executing postbuild.sh..."
          ./postbuild.sh
        shell: bash
      
      - name: Verify build artifact
        if: steps.runner-check.outputs.match == 'true'
        id: verify
        run: |
          WORK_DIR="${{ steps.find-cmake.outputs.work-dir }}"
          ARTIFACT="$WORK_DIR/built_artefact.tar.bz2"
          
          if [ ! -f "$ARTIFACT" ]; then
            echo "::error::built_artefact.tar.bz2 not found in $WORK_DIR"
            exit 1
          fi
          
          ARTIFACT_SIZE=$(stat -c%s "$ARTIFACT" 2>/dev/null || stat -f%z "$ARTIFACT" 2>/dev/null)
          echo "::notice::Build artifact created: $ARTIFACT_SIZE bytes"
          
          echo "artifact-path=$ARTIFACT" >> $GITHUB_OUTPUT
        shell: bash
      
      - name: Prepare artifacts for upload
        if: steps.runner-check.outputs.match == 'true'
        run: |
          WORK_DIR="${{ steps.find-cmake.outputs.work-dir }}"
          
          echo "Copying built_artefact.tar.bz2 to workspace..."
          cp "$WORK_DIR/built_artefact.tar.bz2" .
          
          echo "Artifacts ready for upload:"
          ls -lh built_artefact.tar.bz2 runner-images.txt target-cmake.json *.sh
        shell: bash
      
      - name: Upload build artifacts
        if: steps.runner-check.outputs.match == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            built_artefact.tar.bz2
            runner-images.txt
            target-cmake.json
            prebuild.sh
            build.sh
            postbuild.sh
          retention-days: 90
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./artifacts
      
      - name: Generate release tag
        id: tag
        run: |
          TARGET_NAME="${{ needs.prepare.outputs.target-name }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="${TARGET_NAME}_T${TIMESTAMP}"
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "::notice::Release tag: $TAG"
      
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ needs.prepare.outputs.target-name }} Build
          body: |
            Build release for ${{ needs.prepare.outputs.target-name }}

            ## Build Configuration
            - GROMACS Version: 2026.0
            - Build Type: Release (static libraries)
            - Platform: Ubuntu 24.04 AMD64
            - CUDA Toolkit: 12.6
            - SIMD: AVX2_256
            - MPI: Enabled (OpenMPI for multi-GPU)
            - Threading: Thread-MPI + MPI
            - Precision: Single/Mixed

            ## GPU Support
            CUDA Compute Capabilities: 80;86;89;90

            Supported GPU Architectures:
            - Ampere (Compute Capability 8.0-8.6)
              * Datacenter: A100 (8.0), A10/A40/A16/A2 (8.6)
              * Consumer: RTX 30 series (8.6)
            - Ada Lovelace (Compute Capability 8.9)
              * Workstation: L40, L40S (8.9)
              * Consumer: RTX 40 series (8.9)
            - Hopper (Compute Capability 9.0)
              * Datacenter: H100, H200 (9.0)

            NOT Supported:
            - RTX 50 series (Blackwell, Compute Capability 12.0) - Requires CUDA 13.0+
            - Pascal generation (Compute Capability 6.1) - Too old
            - All AMD GPUs

            CUDA Architecture Selection:
            GROMACS builds GPU kernels at compile-time for specific compute capabilities.
            This binary contains pre-compiled kernels for Ampere (80;86), Ada (89), and Hopper (90).
            GPUs with incompatible compute capabilities will fail with "no kernel image is available" error.

            ## System Requirements
            - NVIDIA GPU with Compute Capability 8.0 or higher
            - CUDA 12.1+ compatible driver
            - Linux x86_64 (glibc 2.17+)
            - Minimum 4GB RAM per GPU (8GB+ recommended)

            ## Multi-GPU Support
            - MPI enabled for multi-GPU and multi-node simulations
            - GPU-aware MPI auto-detected at compile time (OpenMPI 4.1+)
            - No user configuration required for standard usage
            - Use mpirun/mpiexec for parallel execution

            Troubleshooting:
            If GPU-aware MPI fails to auto-detect (rare):
              export GMX_FORCE_GPU_AWARE_MPI=1

            ## Installation
            1. Download built_artefact.tar.bz2
            2. Extract: tar -xjf built_artefact.tar.bz2
            3. Source environment: source bin/GMXRC
            4. Verify: gmx_mpi --version

            Expected output should show:
            - GPU support: CUDA
            - MPI support: Yes
            - SIMD instructions: AVX2_256

            ## Artifacts
            - `built_artefact.tar.bz2` - GROMACS installation package
            - `runner-images.txt` - Runner configuration
            - `target-cmake.json` - Build target configuration
            - `prebuild.sh` - Pre-build script (dependency installation)
            - `build.sh` - Build script (CMake configuration and compilation)
            - `postbuild.sh` - Post-build script (artifact creation)

            ## Runner Information
            - Runner: ${{ needs.prepare.outputs.expected-runner }}
            - Build Time: ${{ github.event.head_commit.timestamp }}

            ## Documentation
            - GROMACS Manual: https://manual.gromacs.org/current/
            - Installation Guide: https://manual.gromacs.org/current/install-guide/index.html
            - GPU Support: https://manual.gromacs.org/current/user-guide/mdrun-gpu.html
          files: |
            artifacts/built_artefact.tar.bz2
            artifacts/runner-images.txt
            artifacts/target-cmake.json
            artifacts/prebuild.sh
            artifacts/build.sh
            artifacts/postbuild.sh
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
