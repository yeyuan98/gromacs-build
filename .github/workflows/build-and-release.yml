name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tarball-url: ${{ steps.read-config.outputs.tarball-url }}
      variant-count: ${{ steps.read-config.outputs.variant-count }}
      variant-matrix: ${{ steps.read-config.outputs.variant-matrix }}
      gromacs-version: ${{ steps.read-config.outputs.gromacs-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read configuration
        id: read-config
        run: |
          TARBALL_URL=$(jq -r '.tarball_url' target-cmake.json)
          GMX_VERSION=$(jq -r '.gromacs_version' target-cmake.json)
          VARIANT_COUNT=$(jq '.variants | length' target-cmake.json)
          VARIANT_MATRIX=$(jq -c '.variants | to_entries | map({index: .key, simd: .value.GMX_SIMD, double: .value.GMX_DOUBLE, mpi: (.value.GMX_MPI // "OFF"), gpu: (.value.GMX_GPU // "CUDA")})' target-cmake.json)

          echo "tarball-url=$TARBALL_URL" >> $GITHUB_OUTPUT
          echo "variant-count=$VARIANT_COUNT" >> $GITHUB_OUTPUT
          echo "variant-matrix=$VARIANT_MATRIX" >> $GITHUB_OUTPUT
          echo "gromacs-version=$GMX_VERSION" >> $GITHUB_OUTPUT

          echo "::notice::GROMACS $GMX_VERSION, $VARIANT_COUNT variants"
          echo "::notice::$VARIANT_MATRIX"

  build:
    needs: prepare
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.variant-matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download tarball
        id: download
        run: |
          TARBALL_URL="${{ needs.prepare.outputs.tarball-url }}"
          FILENAME=$(basename "$TARBALL_URL" | cut -d'?' -f1)
          ARCHIVE_PATH="${{ runner.temp }}/$FILENAME"

          echo "Downloading from: $TARBALL_URL"
          curl -L -o "$ARCHIVE_PATH" "$TARBALL_URL"

          echo "archive-path=$ARCHIVE_PATH" >> $GITHUB_OUTPUT
          echo "Download complete: $(ls -lh "$ARCHIVE_PATH")"
        shell: bash

      - name: Extract tarball
        id: extract
        run: |
          ARCHIVE_PATH="${{ steps.download.outputs.archive-path }}"
          EXTRACT_DIR="${{ runner.temp }}/extracted"

          mkdir -p "$EXTRACT_DIR"
          tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"

          echo "extract-dir=$EXTRACT_DIR" >> $GITHUB_OUTPUT
        shell: bash

      - name: Find CMakeLists.txt directory
        id: find-cmake
        run: |
          EXTRACT_DIR="${{ steps.extract.outputs.extract-dir }}"

          if [ -f "$EXTRACT_DIR/CMakeLists.txt" ]; then
            WORK_DIR="$EXTRACT_DIR"
          else
            SUBDIR_COUNT=$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d | wc -l)
            if [ "$SUBDIR_COUNT" -eq 1 ]; then
              WRAPPER_DIR=$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 -type d)
              if [ -f "$WRAPPER_DIR/CMakeLists.txt" ]; then
                WORK_DIR="$WRAPPER_DIR"
              else
                WORK_DIR=$(find "$WRAPPER_DIR" -type f -name "CMakeLists.txt" -printf '%h\n' -quit | head -n1)
              fi
            else
              WORK_DIR=$(find "$EXTRACT_DIR" -type f -name "CMakeLists.txt" -printf '%h\n' -quit | head -n1)
            fi
          fi

          if [ -z "$WORK_DIR" ]; then
            echo "::error::CMakeLists.txt not found in extracted tarball"
            exit 1
          fi

          if ! grep -q "project" "$WORK_DIR/CMakeLists.txt"; then
            for cmakefile in $(find "$EXTRACT_DIR" -name "CMakeLists.txt" -type f); do
              if grep -q "project" "$cmakefile" 2>/dev/null; then
                WORK_DIR=$(dirname "$cmakefile")
                break
              fi
            done
          fi

          echo "work-dir=$WORK_DIR" >> $GITHUB_OUTPUT
        shell: bash

      - name: Copy build scripts
        run: |
          WORK_DIR="${{ steps.find-cmake.outputs.work-dir }}"
          cp target-cmake.json "$WORK_DIR/"
          cp prebuild.sh "$WORK_DIR/"
          cp build.sh "$WORK_DIR/"
          cp postbuild.sh "$WORK_DIR/"
          cp snapshot.sh "$WORK_DIR/"
          chmod +x "$WORK_DIR"/*.sh
        shell: bash

      - name: Execute prebuild.sh
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: ./prebuild.sh ${{ matrix.variant.index }}
        shell: bash

      - name: Execute build.sh
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: ./build.sh ${{ matrix.variant.index }}
        shell: bash

      - name: Execute postbuild.sh
        working-directory: ${{ steps.find-cmake.outputs.work-dir }}
        run: ./postbuild.sh ${{ matrix.variant.index }}
        shell: bash

      - name: Prepare artifact for upload
        run: |
          WORK_DIR="${{ steps.find-cmake.outputs.work-dir }}"
          ARTIFACT_NAME="${{ matrix.variant.simd }}-$( [ '${{ matrix.variant.double }}' = 'ON' ] && echo double || echo float )$( if [ '${{ matrix.variant.mpi }}' = 'ON' ] && [ '${{ matrix.variant.gpu }}' = 'CUDA' ]; then echo '-mpi'; elif [ '${{ matrix.variant.mpi }}' = 'ON' ]; then echo '-cpu-mpi'; fi ).tar.bz2"
          CONFIG_NAME="build-config-${{ matrix.variant.index }}.sh"

          cp "$WORK_DIR/$ARTIFACT_NAME" .
          cp "$WORK_DIR/$CONFIG_NAME" .
          cp "$WORK_DIR/target-cmake.json" .

          echo "artifact-name=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "config-name=$CONFIG_NAME" >> $GITHUB_ENV

          ls -lh "$ARTIFACT_NAME" "$CONFIG_NAME" target-cmake.json
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-variant-${{ matrix.variant.index }}
          path: |
            ${{ env.artifact-name }}
            ${{ env.config-name }}
            target-cmake.json
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      - name: Collect artifacts and create snapshot
        id: collect
        run: |
          VARIANT_COUNT=${{ needs.prepare.outputs.variant-count }}

          RELEASE_DIR="release"
          mkdir -p "$RELEASE_DIR"

          for i in $(seq 0 $((VARIANT_COUNT - 1))); do
            VARIANT_DIR="artifacts/build-variant-${i}"

            if [ ! -d "$VARIANT_DIR" ]; then
              echo "::error::Artifact directory missing: $VARIANT_DIR"
              exit 1
            fi

            cp "$VARIANT_DIR"/*.tar.bz2 "$RELEASE_DIR/" 2>/dev/null || true
            cp "$VARIANT_DIR"/build-config-*.sh "$RELEASE_DIR/" 2>/dev/null || true
            cp "$VARIANT_DIR"/target-cmake.json "$RELEASE_DIR/" 2>/dev/null || true
          done

          cd "$RELEASE_DIR"
          if [ ! -f target-cmake.json ]; then
            echo "::error::target-cmake.json not found in collected artifacts"
            exit 1
          fi

          bash "$GITHUB_WORKSPACE/snapshot.sh" "$VARIANT_COUNT"

          echo ""
          echo "Release files:"
          ls -lh *.tar.bz2
          echo ""
        shell: bash

      - name: Generate release tag
        id: tag
        run: |
          GMX_VERSION=${{ needs.prepare.outputs.gromacs-version }}
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="GROMACS-${GMX_VERSION}_T${TIMESTAMP}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "::notice::Release tag: $TAG"

      - name: Generate release body
        id: release-body
        run: |
          GMX_VERSION="${{ needs.prepare.outputs.gromacs-version }}"
          RUNTIME_DEPS=$(jq -r '.runtime_deps | join(" ")' release/target-cmake.json)

          cp "$GITHUB_WORKSPACE/release-template.md" release_body.md

          sed -i \
            -e "s|@@GMX_VERSION@@|$GMX_VERSION|g" \
            -e "s|@@RUNTIME_DEPS@@|$RUNTIME_DEPS|g" \
            release_body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: GROMACS ${{ needs.prepare.outputs.gromacs-version }} Linux Builds
          body_path: release_body.md
          files: |
            release/*.tar.bz2
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
